version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A src.celery_tasks worker --loglevel=info

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: radu14
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: